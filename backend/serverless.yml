service: accelerate-tanzania-api

frameworkVersion: '3 || 4'

provider:
  name: aws
  runtime: nodejs20.x
  region: eu-west-1
  # NFR-2 — every AWS action MUST use the IBD-DEV profile.
  profile: IBD-DEV
  stage: ${opt:stage, 'dev'}
  environment:
    DATABASE_URL: ${env:DATABASE_URL, ''}
  httpApi:
    cors: true

package:
  individually: false
  patterns:
    - '!**'
    - 'dist/**'
    - 'node_modules/**'
    - 'prisma/schema.prisma'

functions:
  api:
    # Single Lambda wrapping the whole NestJS app (detailed-design §1).
    handler: dist/lambda.handler
    events:
      # Catch-all route — Nest's router (with the api/v1 prefix) dispatches.
      - httpApi:
          path: /{proxy+}
          method: '*'
      - httpApi:
          path: /
          method: '*'

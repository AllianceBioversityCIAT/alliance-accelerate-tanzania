AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: >-
  ACCELERATE Tanzania (dev) — backend stack: NestJS on Lambda + HTTP API (T-3).
  Stack: accelerate-tz-dev-backend. Composes DATABASE_URL from the data-auth
  cross-stack exports + a Secrets Manager dynamic reference (the password is
  injected at deploy time, never a literal — NFR-2). Deploy with:
  sam deploy --profile IBD-DEV --region eu-west-1.

Parameters:
  AllowedOrigin:
    Type: String
    Description: >-
      CORS allow-origin for the HTTP API. Default `*` for the dev bootstrap
      (step 3); locked to the CloudFront URL on the set-cors redeploy (step 5,
      FR-6, DD-6).
    Default: "*"
  DataAuthStackName:
    Type: String
    Description: >-
      Name of the data-auth stack that exports the DB wiring values
      (DbSecretArn, RdsEndpoint, RdsPort, DbName, DbMasterUsername). Imported
      here via Fn::ImportValue to compose DATABASE_URL.
    Default: accelerate-tz-dev-data-auth

Resources:
  # ════════════════════════════════════════════════════════════════════════════
  # T-3 — NestJS Lambda (FR-3, FR-7, NFR-2; DD-2, DD-4)
  # ════════════════════════════════════════════════════════════════════════════
  # One Lambda wrapping the whole NestJS app (dist/lambda.handler, serverless-http).
  # Outside the VPC (DD-2: free internet egress, no NAT/VPC endpoints) — it reaches
  # the public RDS endpoint over TLS. DATABASE_URL is COMPOSED here with !Sub (DD-4):
  # host/user/db/port come from the data-auth exports via Fn::ImportValue, and the
  # password is a Secrets Manager dynamic reference resolved at deploy time — so no
  # secret value ever lands in this template or the repo (NFR-2).
  ApiFunction:
    Type: AWS::Serverless::Function
    # Build with the project Makefile (backend/Makefile) instead of the default
    # `npm pack` builder: the compiled `dist/` is gitignored, so npm-pack would
    # ship source without `dist/lambda.handler`. The Makefile target runs
    # `npm ci && npm run build` and stages dist/ + prisma + the rhel Prisma engine
    # into the artifact, so the deployed handler and query engine are present.
    Metadata:
      BuildMethod: makefile
    Properties:
      FunctionName: !Sub "${AWS::StackName}-api"
      CodeUri: ../../backend
      Handler: dist/lambda.handler
      Runtime: nodejs20.x
      MemorySize: 512
      Timeout: 15
      # Cap concurrency to keep dev RDS connections + cost bounded (NFR-6).
      ReservedConcurrentExecutions: 5
      # NO VpcConfig — Lambda runs outside the VPC (DD-2).
      Environment:
        Variables:
          # Composed Prisma connection string. Password ONLY via the
          # {{resolve:secretsmanager:...:SecretString:password}} dynamic reference
          # (NFR-2). `sslaccept=strict` keeps TLS on (NFR-4).
          # Runbook note (T-10): if the RDS server cert chain is not trusted by the
          # Lambda's default CA store, the operator may need to bundle the RDS CA
          # (sslcert=...) or relax to `sslaccept=accept_invalid_certs` at apply
          # time — a documented runbook concern, not a template change.
          DATABASE_URL: !Sub
            - "mysql://${User}:{{resolve:secretsmanager:${SecretArn}:SecretString:password}}@${Host}:${Port}/${Db}?sslaccept=strict"
            - User: !ImportValue
                Fn::Sub: "${DataAuthStackName}-DbMasterUsername"
              SecretArn: !ImportValue
                Fn::Sub: "${DataAuthStackName}-DbSecretArn"
              Host: !ImportValue
                Fn::Sub: "${DataAuthStackName}-RdsEndpoint"
              Port: !ImportValue
                Fn::Sub: "${DataAuthStackName}-RdsPort"
              Db: !ImportValue
                Fn::Sub: "${DataAuthStackName}-DbName"
      Policies:
        # SAM adds the default CloudWatch Logs policy automatically. This scoped
        # statement adds GetSecretValue limited to the ONE data-auth secret.
        # (DATABASE_URL is injected at deploy via the dynamic reference, so a
        # runtime GetSecretValue is currently unused — included, scoped, for
        # optional rotation/runtime-read. Never a `*` resource.)
        - Statement:
            - Effect: Allow
              Action: secretsmanager:GetSecretValue
              Resource: !ImportValue
                Fn::Sub: "${DataAuthStackName}-DbSecretArn"
      Events:
        # HTTP API catch-all — the NestJS app owns the api/v1 prefix internally,
        # so every path (and the root) proxies to the single handler.
        Proxy:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /{proxy+}
            Method: ANY
        Root:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /
            Method: ANY

  # ════════════════════════════════════════════════════════════════════════════
  # HTTP API (API Gateway v2) — auto $default stage serves at the root domain,
  # so ApiBaseUrl has no path prefix; clients append /api/v1/... (FR-3, FR-7).
  # ════════════════════════════════════════════════════════════════════════════
  HttpApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      # Read-only public API: GET + OPTIONS (CORS preflight) suffice.
      CorsConfiguration:
        AllowOrigins:
          - !Ref AllowedOrigin
        AllowMethods:
          - GET
          - OPTIONS
        AllowHeaders:
          - Content-Type

Outputs:
  ApiBaseUrl:
    Description: >-
      HTTP API root URL ($default stage; no path prefix). Clients append
      /api/v1/... Consumed by the frontend build (NEXT_PUBLIC_API_BASE_URL, T-8).
    Value: !Sub "https://${HttpApi}.execute-api.${AWS::Region}.amazonaws.com"
    Export:
      Name: !Sub "${AWS::StackName}-ApiBaseUrl"

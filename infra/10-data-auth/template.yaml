AWSTemplateFormatVersion: "2010-09-09"
Description: >-
  ACCELERATE Tanzania (dev) - data + auth stack: RDS MySQL + Secrets Manager
  (T-2) and Cognito user pool/client/groups (T-4). Stack: accelerate-tz-dev-data-auth.
  Deploy with: sam deploy --profile IBD-DEV --region eu-west-1.

# Authored by:
#   T-2 - AWS::RDS::DBInstance, AWS::EC2::SecurityGroup, AWS::SecretsManager::Secret  (RDS section)
#   T-4 - AWS::Cognito::UserPool, AWS::Cognito::UserPoolClient, two AWS::Cognito::UserPoolGroup  (Cognito section)
# Shared params (see infra/README.md): DevCidr (T-2). Cognito needs no parameters (FR-4: pool/client/groups only).
# Outputs: RdsEndpoint, RdsPort, DbSecretArn, DbSecurityGroupId, DbName, DbMasterUsername  (T-2)
#   ·  UserPoolId, UserPoolClientId  (T-4).

Parameters:
  # ── T-2 parameters ────────────────────────────────────────────────────────
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: >-
      The account default VPC id in eu-west-1. The DB security group is placed
      here so RDS lands in the default VPC (no DBSubnetGroup, no custom VPC; NFR-3).
      Operator passes the default VPC id at deploy time.
  DevCidr:
    Type: String
    Description: >-
      Operator public IP as a /32 CIDR (e.g. 203.0.113.7/32) - the admin/migration
      ingress rule on 3306 (OQ-6). Supplied at deploy time.
    AllowedPattern: ^(\d{1,3}\.){3}\d{1,3}/\d{1,2}$
    ConstraintDescription: Must be a CIDR block, e.g. 203.0.113.7/32.
  DbName:
    Type: String
    Description: Initial MySQL database / schema name created on the instance.
    Default: accelerate
    AllowedPattern: ^[a-zA-Z][a-zA-Z0-9_]{0,63}$
    ConstraintDescription: Must start with a letter; letters/digits/underscore only.
  DbInstanceClass:
    Type: String
    Description: RDS instance class (cost-aware default per NFR-6).
    Default: db.t3.micro
  DbAllocatedStorage:
    Type: Number
    Description: Allocated storage in GiB (cost-aware default per NFR-6).
    Default: 20
    MinValue: 20
    MaxValue: 100

  # ── Cognito email (SES) parameters — admin-user-invite-and-reset spec §7.1 ──
  # Two-phase, reversible rollout gates. Defaults preserve today's
  # COGNITO_DEFAULT mailer behavior (empty SenderEmail / EnableSesSending=false).
  SenderEmail:
    Type: String
    Default: ""
    Description: >-
      Project-controlled SES sender address to verify (DEP-1). Empty keeps the
      default Cognito mailer (COGNITO_DEFAULT) — a safe no-op.
  EnableSesSending:
    Type: String
    Default: "false"
    AllowedValues: ["true", "false"]
    Description: >-
      Phase-B gate. When "true" (and SenderEmail set), EmailConfiguration flips to
      DEVELOPER (send through the verified SES identity). Kept "false" for Phase A.
  PortalUrl:
    Type: String
    Default: "https://d3idqvvg0xa1r7.cloudfront.net"
    Description: >-
      Admin portal base URL used in the invitation email CTA (/login is appended).

# ── Conditions — gate the SES identity (Phase A) and the DEVELOPER switch
#    (Phase B). The two-gate split enables the verify-then-configure rollout. ──
Conditions:
  # SenderEmail provided → create the SES identity (Phase A).
  HasSender: !Not [!Equals [!Ref SenderEmail, ""]]
  # Sender provided AND sending explicitly enabled → DEVELOPER email config (Phase B).
  UseSes: !And
    - !Condition HasSender
    - !Equals [!Ref EnableSesSending, "true"]

Resources:
  # ════════════════════════════════════════════════════════════════════════════
  # T-2 - RDS MySQL + Secrets Manager + security group  (FR-2, FR-7, NFR-2/4/6)
  # ════════════════════════════════════════════════════════════════════════════

  # Generated master credentials live ONLY in Secrets Manager (NFR-2). The password
  # is never a literal/default/output; RDS consumes it via {{resolve:...}} dynamic
  # references below. Per DD-4 we store only {username, password} - NOT a composed
  # `url`, because the RDS host is unknown at secret-create time (chicken-and-egg);
  # T-3 composes DATABASE_URL where the host is known.
  DbSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub "${AWS::StackName}-db-credentials"
      Description: >-
        Master credentials for the ACCELERATE dev RDS MySQL instance.
        JSON: {"username","password"}. Password generated; never committed (NFR-2).
      GenerateSecretString:
        SecretStringTemplate: '{"username":"accelerate_admin"}'
        GenerateStringKey: password
        PasswordLength: 24
        # Exclude characters that break MySQL auth or URL-encoding of DATABASE_URL
        # (T-3 composes mysql://user:pass@host:3306/db). Quotes, @, /, backslash, space.
        ExcludeCharacters: '"@/\ '

  # Outside-VPC Lambda reaches RDS over the public endpoint (DD-2). Two explicit,
  # commented ingress rules on 3306. Placed in the default VPC via VpcId.
  DbSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: >-
        ACCELERATE dev RDS MySQL access (dev-only; DD-2). Admin/migrate from the
        operator IP + 0.0.0.0/0 for the outside-VPC Lambda. Harden later.
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        # admin/migration from operator IP (prisma migrate deploy + seed, FR-2)
        - IpProtocol: tcp
          FromPort: 3306
          ToPort: 3306
          CidrIp: !Ref DevCidr
          Description: admin/migration from operator IP (/32)
        # outside-VPC Lambda - see DD-2; dev-only, harden later
        - IpProtocol: tcp
          FromPort: 3306
          ToPort: 3306
          CidrIp: 0.0.0.0/0
          Description: outside-VPC Lambda - DD-2; dev-only, harden later
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-db-sg"

  # Single MySQL instance in the default VPC, publicly reachable, TLS-capable
  # (RDS MySQL serves TLS by default; the connection string enforces it in T-3).
  # Cost-aware: micro / single-AZ / small storage / 1-day backups (NFR-6).
  Db:
    Type: AWS::RDS::DBInstance
    # Ordering: the MasterUsername/MasterUserPassword dynamic references below
    # carry an implicit ${DbSecret} dependency, so no explicit DependsOn is needed.
    Properties:
      Engine: mysql
      DBInstanceClass: !Ref DbInstanceClass
      AllocatedStorage: !Ref DbAllocatedStorage
      DBName: !Ref DbName
      # Master user/password reach RDS via Secrets Manager dynamic references only -
      # no literal anywhere (NFR-2).
      MasterUsername: !Sub "{{resolve:secretsmanager:${DbSecret}:SecretString:username}}"
      MasterUserPassword: !Sub "{{resolve:secretsmanager:${DbSecret}:SecretString:password}}"
      VPCSecurityGroups:
        - !GetAtt DbSecurityGroup.GroupId
      PubliclyAccessible: true   # public endpoint in default VPC (DD-2, dev-only)
      MultiAZ: false             # single-AZ (NFR-6)
      StorageEncrypted: true     # at-rest encryption
      BackupRetentionPeriod: 1   # minimal backups for dev (NFR-6)
      DeletionProtection: false  # easy teardown (NFR-6)
      # No DBSubnetGroup → default VPC (NFR-3).
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-mysql"

  # Bind the secret to the DB instance so Secrets Manager knows the target
  # (enables future rotation; keeps the secret/DB linkage explicit).
  DbSecretAttachment:
    Type: AWS::SecretsManager::SecretTargetAttachment
    Properties:
      SecretId: !Ref DbSecret
      TargetId: !Ref Db
      TargetType: AWS::RDS::DBInstance

  # ════════════════════════════════════════════════════════════════════════════
  # T-4 - Cognito user pool + client + groups  (FR-4, FR-7)
  # ════════════════════════════════════════════════════════════════════════════
  # Identity backbone for the staff/admin RBAC model. This task provisions the
  # pool, a public SPA app client (no secret), and the admin/staff groups ONLY -
  # NO users are created (FR-4), and NO Hosted UI / domain / OAuth flows are set
  # up here (deferred to the auth-wiring spec, OQ-4): those need the CloudFront
  # URL for callback URLs, which doesn't exist yet. Anonymous callers map to the
  # Public role and are not modeled in Cognito.

  # SES sender identity (admin-user-invite-and-reset §7.1). Created in Phase A
  # when SenderEmail is provided; creating it triggers AWS's verification email
  # (the identity resource reaches CREATE_COMPLETE immediately — verification is
  # the async operator step, DEP-1). No identity-policy property exists on this
  # resource; the Cognito sending-authorization policy is attached out-of-band via
  # `aws ses put-identity-policy` (see ses-cognito-send-policy.json + runbook).
  SesSenderIdentity:
    Type: AWS::SES::EmailIdentity
    Condition: HasSender
    Properties:
      EmailIdentity: !Ref SenderEmail

  # Email-based sign-in, self-managed by admins (no public self-signup - these
  # are internal staff/admin identities). Strong password policy per §6.
  UserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: !Sub "${AWS::StackName}-users"
      # Sign in with email (email is the username); auto-verify it so admin-created
      # users get the standard verification path.
      UsernameAttributes:
        - email
      AutoVerifiedAttributes:
        - email
      # Route Cognito email through SES only in Phase B (UseSes). Unset →
      # COGNITO_DEFAULT (today's behavior). §7.1: DEVELOPER sends from the verified
      # project identity; requires the sending-authorization policy (attached
      # out-of-band, see SesSenderIdentity comment).
      EmailConfiguration: !If
        - UseSes
        - EmailSendingAccount: DEVELOPER
          From: !Sub "ACCELERATE Seed Registry <${SenderEmail}>"
          SourceArn: !Sub "arn:aws:ses:${AWS::Region}:${AWS::AccountId}:identity/${SenderEmail}"
        - !Ref "AWS::NoValue"
      # Admin-managed only: staff/admin accounts are created by an admin, never via
      # public self-signup (RBAC model - no anonymous registration).
      AdminCreateUserConfig:
        AllowAdminCreateUserOnly: true
        # Branded English invitation email (FR-2). Table-based, inline styles only
        # (email-client-safe). MUST contain {username} + {####} or Cognito rejects
        # it. PortalUrl is CFN-substituted; {username}/{####} are Cognito placeholders
        # (no ${...}, so safe inside !Sub). CTA links to ${PortalUrl}/login.
        InviteMessageTemplate:
          EmailSubject: "Your ACCELERATE Seed Registry admin account"
          EmailMessage: !Sub |
            <!DOCTYPE html>
            <html lang="en">
              <body style="margin:0;padding:0;background-color:#F7F7F7;">
                <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color:#F7F7F7;">
                  <tr>
                    <td align="center" style="padding:24px 12px;">
                      <table role="presentation" width="600" cellpadding="0" cellspacing="0" style="max-width:600px;width:100%;background-color:#ffffff;border:1px solid #E2E2E2;border-radius:8px;overflow:hidden;font-family:Arial,Helvetica,sans-serif;">
                        <tr>
                          <td style="background-color:#1F4E8C;padding:20px 32px;">
                            <span style="color:#ffffff;font-size:20px;font-weight:bold;letter-spacing:0.5px;">ACCELERATE Seed Registry</span>
                          </td>
                        </tr>
                        <tr>
                          <td style="padding:32px;color:#333333;font-size:15px;line-height:1.6;">
                            <p style="margin:0 0 16px;">Welcome! An administrator has created an account for you on the ACCELERATE Seed Registry admin portal.</p>
                            <p style="margin:0 0 8px;">Use these credentials to sign in for the first time:</p>
                            <table role="presentation" cellpadding="0" cellspacing="0" width="100%" style="margin:0 0 24px;background-color:#F7F7F7;border:1px solid #E2E2E2;border-radius:6px;">
                              <tr>
                                <td style="padding:16px 20px;color:#333333;font-size:15px;line-height:1.8;">
                                  <div><span style="color:#666666;">Username:</span> <strong>{username}</strong></div>
                                  <div><span style="color:#666666;">Temporary password:</span> <strong>{####}</strong></div>
                                </td>
                              </tr>
                            </table>
                            <table role="presentation" cellpadding="0" cellspacing="0">
                              <tr>
                                <td style="border-radius:6px;background-color:#1F4E8C;">
                                  <a href="${PortalUrl}/login" style="display:inline-block;padding:12px 28px;color:#ffffff;font-size:15px;font-weight:bold;text-decoration:none;">Sign in to the portal</a>
                                </td>
                              </tr>
                            </table>
                            <p style="margin:24px 0 4px;color:#666666;font-size:13px;line-height:1.6;">Or open this link: ${PortalUrl}/login</p>
                            <p style="margin:16px 0 0;color:#666666;font-size:13px;line-height:1.6;">You will be asked to set a new password when you first sign in. If you did not expect this email, you can safely ignore it.</p>
                          </td>
                        </tr>
                      </table>
                    </td>
                  </tr>
                </table>
              </body>
            </html>
      Policies:
        PasswordPolicy:
          MinimumLength: 12
          RequireUppercase: true
          RequireLowercase: true
          RequireNumbers: true
          RequireSymbols: true
      # Branded English reset/verification email (FR-3). CONFIRM_WITH_CODE emails a
      # numeric CODE (not a link); copy says "code". MUST contain {####}.
      VerificationMessageTemplate:
        DefaultEmailOption: CONFIRM_WITH_CODE
        EmailSubject: "Your ACCELERATE Seed Registry verification code"
        EmailMessage: |
          <!DOCTYPE html>
          <html lang="en">
            <body style="margin:0;padding:0;background-color:#F7F7F7;">
              <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color:#F7F7F7;">
                <tr>
                  <td align="center" style="padding:24px 12px;">
                    <table role="presentation" width="600" cellpadding="0" cellspacing="0" style="max-width:600px;width:100%;background-color:#ffffff;border:1px solid #E2E2E2;border-radius:8px;overflow:hidden;font-family:Arial,Helvetica,sans-serif;">
                      <tr>
                        <td style="background-color:#1F4E8C;padding:20px 32px;">
                          <span style="color:#ffffff;font-size:20px;font-weight:bold;letter-spacing:0.5px;">ACCELERATE Seed Registry</span>
                        </td>
                      </tr>
                      <tr>
                        <td style="padding:32px;color:#333333;font-size:15px;line-height:1.6;">
                          <p style="margin:0 0 16px;">We received a request to reset your password for the ACCELERATE Seed Registry admin portal.</p>
                          <p style="margin:0 0 8px;">Enter this verification code to set a new password:</p>
                          <table role="presentation" cellpadding="0" cellspacing="0" width="100%" style="margin:0 0 24px;background-color:#F7F7F7;border:1px solid #E2E2E2;border-radius:6px;">
                            <tr>
                              <td align="center" style="padding:20px;color:#1F4E8C;font-size:28px;font-weight:bold;letter-spacing:4px;">{####}</td>
                            </tr>
                          </table>
                          <p style="margin:0;color:#666666;font-size:13px;line-height:1.6;">This code expires shortly. If you did not request a password reset, you can safely ignore this email.</p>
                        </td>
                      </tr>
                    </table>
                  </td>
                </tr>
              </table>
            </body>
          </html>

  # Public SPA client: NO generated secret (a static SPA can't keep one - NFR-2).
  # SRP + refresh-token flows are the SPA-appropriate set without a Hosted UI; we
  # also enable USER_PASSWORD_AUTH for convenience in dev/admin tooling. NO OAuth
  # flows / CallbackURLs / Hosted-UI domain here (deferred - OQ-4).
  UserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: !Sub "${AWS::StackName}-spa-client"
      UserPoolId: !Ref UserPool
      GenerateSecret: false
      ExplicitAuthFlows:
        - ALLOW_USER_SRP_AUTH
        - ALLOW_USER_PASSWORD_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH
      # Reasonable token validities for a dev environment.
      AccessTokenValidity: 1     # hours
      IdTokenValidity: 1         # hours
      RefreshTokenValidity: 30   # days
      TokenValidityUnits:
        AccessToken: hours
        IdToken: hours
        RefreshToken: days

  # RBAC groups. admin has the lower Precedence number = higher priority when a
  # user belongs to both. Public (anonymous) is intentionally NOT a group.
  AdminGroup:
    Type: AWS::Cognito::UserPoolGroup
    Properties:
      GroupName: admin
      UserPoolId: !Ref UserPool
      Description: Administrators - full management access (highest RBAC priority).
      Precedence: 1

  StaffGroup:
    Type: AWS::Cognito::UserPoolGroup
    Properties:
      GroupName: staff
      UserPoolId: !Ref UserPool
      Description: Staff - operational access below admin.
      Precedence: 10

Outputs:
  # ── T-2 outputs (FR-7). Exported so T-3 can Fn::ImportValue the cross-stack
  #    wiring values (DbSecretArn, RdsEndpoint, DbName, DbMasterUsername). ──
  RdsEndpoint:
    Description: RDS instance endpoint hostname.
    Value: !GetAtt Db.Endpoint.Address
    Export:
      Name: !Sub "${AWS::StackName}-RdsEndpoint"
  RdsPort:
    Description: RDS instance port.
    Value: !GetAtt Db.Endpoint.Port
    Export:
      Name: !Sub "${AWS::StackName}-RdsPort"
  DbSecretArn:
    Description: ARN of the Secrets Manager secret holding {username, password}.
    Value: !Ref DbSecret
    Export:
      Name: !Sub "${AWS::StackName}-DbSecretArn"
  DbSecurityGroupId:
    Description: Security group id guarding RDS on 3306.
    Value: !GetAtt DbSecurityGroup.GroupId
    Export:
      Name: !Sub "${AWS::StackName}-DbSecurityGroupId"
  DbName:
    Description: Initial database/schema name.
    Value: !Ref DbName
    Export:
      Name: !Sub "${AWS::StackName}-DbName"
  DbMasterUsername:
    Description: >-
      Master username (NOT the password - the password lives only in Secrets Manager).
    # Literal to match SecretStringTemplate's username; CloudFormation does not
    # support {{resolve:secretsmanager:...}} dynamic references inside Outputs.
    Value: accelerate_admin
    Export:
      Name: !Sub "${AWS::StackName}-DbMasterUsername"

  # ── T-4 Cognito outputs (FR-7). Exported for the future auth-wiring spec to
  #    Fn::ImportValue the pool/client IDs (the SPA needs both to authenticate). ──
  UserPoolId:
    Description: Cognito User Pool id (staff/admin identities).
    Value: !Ref UserPool
    Export:
      Name: !Sub "${AWS::StackName}-UserPoolId"
  UserPoolClientId:
    Description: Cognito public SPA app client id (no secret).
    Value: !Ref UserPoolClient
    Export:
      Name: !Sub "${AWS::StackName}-UserPoolClientId"
